name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve
      description: The use case or gap you have hit. "I'm trying to … but …"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you'd like
      description: The behavior or API you have in mind. Rough is fine.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or thought about.
    validations:
      required: false
